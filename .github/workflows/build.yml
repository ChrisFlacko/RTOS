name: CI-Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    name: Build RTOS
    runs-on: ubuntu-latest

    container:
      image: ubuntu:24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          apt-get update
          apt-get install -y build-essential cmake
          apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Clean build directory
        run: rm -rf build

      - name: Configure with CMake
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=cmake/arm-toolchain.cmake

      - name: Build project
        run: cmake --build build

      - name: Check build artifacts
        run: |
          ls -lah build/
          file build/RTOS.elf build/RTOS.elf.bin || true 
